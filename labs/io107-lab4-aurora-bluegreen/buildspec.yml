###############################################################################
# IO-107 Lab 4 — buildspec.yml
#
# AWS CodeBuild phases for the Aurora Blue/Green deployment pipeline.
#
# Pipeline shape:
#   Source -> Build (plan) -> Validate (OPA) -> Approval (manual) -> Deploy (apply)
#
# This buildspec runs in TWO CodeBuild projects in the pipeline:
#   - Plan/Validate build (TF_PHASE=plan)  -> install, init, plan, conftest test
#   - Apply build         (TF_PHASE=apply) -> apply the tfplan artefact from the
#                                              Plan/Validate build
#
# The Approval action sits between the two builds in CodePipeline itself, not
# in this file. CodePipeline passes the `tfplan` artefact from Build to Deploy.
###############################################################################

version: 0.2

env:
  variables:
    TF_VERSION: "1.7.5"
    CONFTEST_VERSION: "0.50.0"
    TF_IN_AUTOMATION: "true"
    # Set by the CodePipeline action — "plan" for the validate stage, "apply" for deploy.
    TF_PHASE: "plan"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing Terraform ${TF_VERSION} and Conftest ${CONFTEST_VERSION}"
      - curl -sSL -o /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"
      - unzip -q /tmp/terraform.zip -d /usr/local/bin/
      - terraform version
      - curl -sSL -o /tmp/conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
      - tar -xzf /tmp/conftest.tar.gz -C /usr/local/bin/ conftest
      - conftest --version

  pre_build:
    commands:
      - echo "Phase = ${TF_PHASE}"
      - cd terraform
      - terraform init -input=false -no-color
      - |
        if [ "${TF_PHASE}" = "plan" ]; then
          echo "Running terraform plan"
          terraform plan -input=false -no-color -out=tfplan
          terraform show -json tfplan > tfplan.json
        fi

  build:
    commands:
      - |
        if [ "${TF_PHASE}" = "plan" ]; then
          echo "Validating plan with Conftest / OPA"
          cd ..
          conftest test terraform/tfplan.json -p policies/ --no-color
        fi

  post_build:
    commands:
      - |
        if [ "${TF_PHASE}" = "apply" ]; then
          echo "Applying tfplan from prior pipeline stage (post-approval)"
          cd terraform
          terraform apply -input=false -no-color tfplan
        fi

artifacts:
  base-directory: terraform
  files:
    - tfplan
    - tfplan.json
  discard-paths: no
